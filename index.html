<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Web Experiments</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #1b1f24;
        --muted: #5b6673;
        --line: #d8dee4;
        --accent: #0f6cbd;
        --accent-dark: #0b4f8a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, "Helvetica Neue", sans-serif;
        line-height: 1.5;
        color: var(--text);
        background: var(--bg);
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 24px;
      }

      .empty {
        display: grid;
        gap: 12px;
      }

      code {
        display: inline-block;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 2px 6px;
        color: var(--accent-dark);
        background: #eef4fa;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.95em;
      }

      a {
        color: var(--accent);
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 24px, 920px);
          padding: 32px 0;
        }

        h1 {
          font-size: 28px;
        }

        .panel {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Web Experiments</h1>
        <p>独立网页实验入口。</p>
      </header>

      <section class="panel empty" aria-label="实验列表">
        <p>还没有发布实验页面。</p>
        <p>添加新的独立页面后，在这里加入链接，例如 <code>&lt;a href="demo.html"&gt;Demo&lt;/a&gt;</code>。</p>
      </section>
    </main>
  </body>
</html>
