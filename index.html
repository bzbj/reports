<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Web Experiments</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #1b1f24;
        --muted: #5b6673;
        --line: #d8dee4;
        --accent: #0f6cbd;
        --accent-dark: #0b4f8a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, "Helvetica Neue", sans-serif;
        line-height: 1.5;
        color: var(--text);
        background: var(--bg);
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 24px;
      }

      .empty {
        display: grid;
        gap: 12px;
      }

      .report-list {
        display: grid;
        gap: 14px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .report-list a {
        display: block;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        text-decoration: none;
        background: #fbfcfd;
      }

      .report-list a:hover {
        border-color: var(--accent);
      }

      .report-title {
        display: block;
        margin-bottom: 4px;
        color: var(--text);
        font-weight: 700;
      }

      .report-desc {
        display: block;
        color: var(--muted);
      }

      code {
        display: inline-block;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 2px 6px;
        color: var(--accent-dark);
        background: #eef4fa;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.95em;
      }

      a {
        color: var(--accent);
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 24px, 920px);
          padding: 32px 0;
        }

        h1 {
          font-size: 28px;
        }

        .panel {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Web Experiments</h1>
        <p>独立网页实验入口。</p>
      </header>

      <section class="panel" aria-label="报告列表">
        <ul class="report-list">
          <li>
            <a href="US-cloud-sp-comparison.html">
              <span class="report-title">The AI Cloud War: Amazon vs. Microsoft vs. Google</span>
              <span class="report-desc">Q1 2025 - Q4 2025 Market Analysis</span>
            </a>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
